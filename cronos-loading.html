<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cronos — Animação de Loading</title>
<style>
  body { margin:0; background:#06091a; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:Arial,Helvetica,sans-serif; }

  /* ── Keyframes ── */
  @keyframes spin            { to { transform: rotate(360deg) } }
  @keyframes spin-rev        { to { transform: rotate(-360deg) } }
  @keyframes pulse-txt       { 0%,100%{opacity:.5} 50%{opacity:1} }
  @keyframes cronos-glow     { 0%,100%{filter:drop-shadow(0 0 8px rgba(127,119,221,.5));opacity:.85} 50%{filter:drop-shadow(0 0 22px rgba(127,119,221,.9));opacity:1} }
  @keyframes cronos-pulse-ring { 0%,100%{transform:scale(1);opacity:.3} 50%{transform:scale(1.06);opacity:.7} }

  /* ── Elementos do relógio ── */
  .cl-ring     { transform-origin:40px 40px; animation:spin-rev 12s linear infinite }
  .cl-arcs     { transform-origin:40px 40px; animation:spin 3s linear infinite }
  .cl-hand-hr  { transform-origin:40px 40px; animation:spin 16s linear infinite }
  .cl-hand-min { transform-origin:40px 40px; animation:spin 4s linear infinite }
  .cl-hand-sec { transform-origin:40px 40px; animation:spin 1s linear infinite }

  /* ── Overlay (mesmo estilo do sistema) ── */
  .loading-overlay {
    background: rgba(10,10,15,.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    padding: 60px;
    border-radius: 24px;
  }
  .loading-text {
    color: rgba(175,169,236,.9);
    margin-top: 14px;
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: pulse-txt 1.4s ease-in-out infinite;
  }
</style>
</head>
<body>
  <div class="loading-overlay">
    <div style="position:relative;display:flex;flex-direction:column;align-items:center">

      <!-- Halo pulsante -->
      <div style="position:absolute;top:50%;left:50%;width:240px;height:240px;
                  transform:translate(-50%,-50%);border-radius:50%;
                  background:radial-gradient(circle,rgba(144,133,232,.22) 0%,rgba(144,133,232,.06) 55%,transparent 75%);
                  animation:cronos-pulse-ring 2.2s ease-in-out infinite;
                  pointer-events:none"></div>

      <!-- Relógio animado -->
      <svg width="210" height="210" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"
           style="animation:cronos-glow 2.2s ease-in-out infinite">
        <!-- halo interno -->
        <circle cx="40" cy="40" r="38" fill="rgba(144,133,232,0.07)"/>
        <!-- anel externo pontilhado girando -->
        <circle class="cl-ring" cx="40" cy="40" r="36" fill="none"
                stroke="rgba(175,169,236,0.45)" stroke-width="0.9" stroke-dasharray="4 3"/>
        <!-- arcos coloridos girando -->
        <g class="cl-arcs">
          <path d="M40 5 A35 35 0 0 1 75 40" fill="none" stroke="#9085E8" stroke-width="5.5" stroke-linecap="round"/>
          <path d="M75 40 A35 35 0 0 1 40 75" fill="none" stroke="#A89EEA" stroke-width="4"   stroke-linecap="round"/>
          <path d="M40 75 A35 35 0 0 1 5 40"  fill="none" stroke="#C4BFEF" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M5 40 A35 35 0 0 1 40 5"   fill="none" stroke="rgba(220,217,250,0.5)" stroke-width="1.5" stroke-linecap="round"/>
        </g>
        <!-- face do relógio -->
        <circle cx="40" cy="40" r="22" fill="#110e2a" stroke="#8880E0" stroke-width="2"/>
        <!-- marcadores principais -->
        <line x1="40" y1="20" x2="40" y2="25" stroke="#9D97E8" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="60" y1="40" x2="55" y2="40" stroke="#7F77DD" stroke-width="2"   stroke-linecap="round"/>
        <line x1="40" y1="60" x2="40" y2="55" stroke="#7F77DD" stroke-width="2"   stroke-linecap="round"/>
        <line x1="20" y1="40" x2="25" y2="40" stroke="#7F77DD" stroke-width="2"   stroke-linecap="round"/>
        <!-- marcadores diagonais -->
        <line x1="53.6" y1="23.6" x2="51"   y2="27"   stroke="rgba(159,151,232,.55)" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="56.4" y1="53.6" x2="53"   y2="51"   stroke="rgba(159,151,232,.55)" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="26.4" y1="53.6" x2="29"   y2="51"   stroke="rgba(159,151,232,.55)" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="23.6" y1="26.4" x2="27"   y2="29"   stroke="rgba(159,151,232,.55)" stroke-width="1.2" stroke-linecap="round"/>
        <!-- ponteiro hora -->
        <line class="cl-hand-hr"  x1="40" y1="40" x2="50" y2="36" stroke="#E0DCFF" stroke-width="2.4" stroke-linecap="round"/>
        <!-- ponteiro minuto -->
        <line class="cl-hand-min" x1="40" y1="40" x2="40" y2="23" stroke="white"   stroke-width="2.6" stroke-linecap="round"/>
        <!-- ponteiro segundos -->
        <line class="cl-hand-sec" x1="40" y1="44" x2="40" y2="21" stroke="#ff6b6b" stroke-width="1.1" stroke-linecap="round"/>
        <!-- centro -->
        <circle cx="40" cy="40" r="2.8" fill="white"/>
        <circle cx="40" cy="40" r="1.4" fill="#8880E0"/>
      </svg>
    </div>

    <!-- Nome Cronos com gradiente -->
    <div style="margin-top:12px">
      <span style="font-size:1.75rem;font-weight:700;letter-spacing:-.5px;
                   background:linear-gradient(90deg,#fff 40%,#B8B2F0 100%);
                   -webkit-background-clip:text;-webkit-text-fill-color:transparent;
                   background-clip:text">Cronos</span>
    </div>
    <div class="loading-text">Carregando...</div>
  </div>
</body>
</html>
